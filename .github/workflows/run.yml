name: Async Workers Runner

on:
  workflow_dispatch

concurrency:
  group: async-workers
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest

    timeout-minutes: 65   # slightly above 60 min (safety buffer)

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: 🚀 Run script (60 minutes)
        run: |
          echo "Starting workers for 60 minutes..."
          timeout 3600s python -u script.py

      - name: ✅ Finished
        run: echo "Job completed"
